<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>融資支援管理システム</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<style>
  #sidebar { transition: transform 0.25s cubic-bezier(.4,0,.2,1); }
  .page { display: none; }
  .page.active { display: block; }
  .tab-btn { border-bottom: 2px solid transparent; }
  .tab-btn.active { border-bottom-color: #2563eb; color: #2563eb; }
  .drop-zone.drag-over { border-color: #2563eb; background: #eff6ff; }
  .nav-link { color: #94a3b8; }
  .nav-link:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-link.active-nav { background: rgba(59,130,246,0.25); color: #fff; }
  .nav-link.active-nav svg { color: #60a5fa; }
  @media (max-width: 768px) {
    #sidebar { position: fixed; z-index: 50; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,0.4); }
    #main { margin-left: 0 !important; }
    #sidebar-overlay { display: block; }
  }
  @media (min-width: 769px) {
    #sidebar-overlay { display: none !important; }
    #menu-btn { display: none !important; }
  }
</style>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- ========== ログイン画面 ========== -->
<div id="login-screen" class="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4">
        <svg class="w-9 h-9 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">融資支援管理システム</h1>
      <p class="text-blue-200 text-sm mt-1">銀行融資支援コンサルティング</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-xl font-bold text-gray-800 mb-6">ログイン</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス</label>
          <input id="login-email" type="email" required placeholder="example@company.com"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">パスワード</label>
          <input id="login-password" type="password" required placeholder="6文字以上" minlength="6"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div id="login-error" class="text-red-500 text-sm hidden"></div>
        <button type="submit"
          class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">
          ログイン
        </button>
      </form>
      <p class="mt-4 text-center text-xs text-gray-400">アカウントの追加はシステム管理者にお問い合わせください</p>
    </div>
  </div>
</div>

<!-- ========== アプリ画面 ========== -->
<div id="app-screen" class="hidden flex h-screen overflow-hidden">

  <!-- モバイルオーバーレイ -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-40" onclick="closeSidebar()"></div>

  <!-- サイドバー -->
  <aside id="sidebar" class="w-60 flex flex-col h-screen shrink-0" style="background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);">
    <div class="px-5 py-5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div>
          <h1 class="text-sm font-bold text-white leading-tight">融資支援管理</h1>
          <p class="text-xs mt-0.5" style="color:#64748b;">コンサルティングシステム</p>
        </div>
      </div>
    </div>
    <div class="mx-4 mb-4 h-px" style="background:rgba(255,255,255,0.08);"></div>
    <nav class="flex-1 px-3 space-y-1">
      <a href="#/" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-all" data-path="/">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        ダッシュボード
      </a>
      <a href="#/clients" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-all" data-path="/clients">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        顧客管理
      </a>
      <a href="#/cases" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer transition-all" data-path="/cases">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        案件管理
      </a>
    </nav>
    <div class="p-3 mx-2 mb-3 rounded-xl" style="background:rgba(255,255,255,0.05);">
      <div class="flex items-center gap-2 px-2 py-1.5 mb-1">
        <div class="w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs font-bold" id="sidebar-avatar">K</div>
        <span id="sidebar-user" class="truncate text-xs text-slate-300"></span>
      </div>
      <button onclick="handleLogout()" class="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg text-xs text-slate-400 hover:text-white hover:bg-white hover:bg-opacity-10 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        ログアウト
      </button>
    </div>
  </aside>

  <!-- メインコンテンツ -->
  <div id="main" class="flex-1 flex flex-col overflow-hidden ml-60">
    <!-- トップバー -->
    <header class="bg-white border-b border-gray-100 h-14 flex items-center px-4 shrink-0 shadow-sm">
      <button id="menu-btn" class="mr-3 p-1.5 rounded-lg text-gray-500 hover:bg-gray-100" onclick="openSidebar()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h2 id="page-title" class="text-base font-semibold text-gray-800 flex-1"></h2>
      <div id="topbar-actions" class="flex items-center gap-2"></div>
    </header>
    <!-- ページコンテンツ -->
    <div id="page-content" class="flex-1 overflow-auto p-4 md:p-6"></div>
  </div>
</div>

<!-- トースト通知 -->
<div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 pointer-events-none"></div>

<!-- モーダル -->
<div id="modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-40 z-40 flex items-center justify-center p-4">
  <div id="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto"></div>
</div>

<!-- ========== JavaScript ========== -->
<script>
// ===== Firebase設定 =====
const firebaseConfig = {
  apiKey: "AIzaSyDRGq-1d5nvrOtlToYd5lLcsTfosijgFzo",
  authDomain: "consulting-37154.firebaseapp.com",
  projectId: "consulting-37154",
  storageBucket: "consulting-37154.firebasestorage.app",
  messagingSenderId: "502558740127",
  appId: "1:502558740127:web:1b01f4325585ca0e9ddcaa"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// ===== 定数 =====
const STATUS_LIST = [
  { id: '初回面談', color: 'bg-gray-100 text-gray-700' },
  { id: '資料収集', color: 'bg-blue-100 text-blue-700' },
  { id: '書類作成', color: 'bg-yellow-100 text-yellow-700' },
  { id: '銀行提出', color: 'bg-purple-100 text-purple-700' },
  { id: '審査中',   color: 'bg-orange-100 text-orange-700' },
  { id: '承認',     color: 'bg-green-100 text-green-700' },
  { id: '否決',     color: 'bg-red-100 text-red-700' },
];
const DEFAULT_DOCUMENTS = [
  '決算書（直近2〜3期分）','試算表（最新月）','確定申告書','法人税申告書',
  '会社概要・パンフレット','登記簿謄本（履歴事項全部証明書）','印鑑証明書',
  '代表者の本人確認書類','事業計画書','資金繰り表','借入一覧表',
  '不動産登記簿（担保がある場合）',
];
const MIME_ICONS = {
  'application/pdf': '📄',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '📝',
  'application/msword': '📝',
  'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': '📊',
  'application/vnd.ms-excel': '📊',
  'image/jpeg': '🖼️', 'image/png': '🖼️',
};

// ===== ユーティリティ =====
let currentUser = null;

// HTML 特殊文字をエスケープ（XSS 対策）
function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g,
    c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

function fmtDate(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : (ts instanceof Date ? ts : new Date(ts));
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function fmtMoney(v) {
  if (!v) return '-';
  return Number(v).toLocaleString('ja-JP') + '万円';
}

function statusBadge(status) {
  const s = STATUS_LIST.find(x => x.id === status) || { color: 'bg-gray-100 text-gray-700' };
  return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${s.color}">${status || '-'}</span>`;
}

function isNearDeadline(deadline) {
  if (!deadline) return false;
  const d = deadline.toDate ? deadline.toDate() : new Date(deadline);
  const diff = (d - new Date()) / (1000*60*60*24);
  return diff >= 0 && diff <= 7;
}

function setPageTitle(title) {
  document.getElementById('page-title').textContent = title;
}

function setTopbarActions(html) {
  document.getElementById('topbar-actions').innerHTML = html;
}

function updateNavActive(path) {
  document.querySelectorAll('.nav-link').forEach(a => {
    const p = a.dataset.path;
    const current = path === '/' ? '/' : path;
    const isActive = current === p || (p !== '/' && current.startsWith(p));
    a.classList.toggle('active-nav', isActive);
    a.classList.toggle('font-medium', isActive);
  });
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.remove('hidden');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.add('hidden');
}

// ===== 認証 =====
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app-screen').classList.remove('hidden');
    const name = user.displayName || user.email;
    document.getElementById('sidebar-user').textContent = name;
    const avatar = document.getElementById('sidebar-avatar');
    if (avatar) avatar.textContent = (name || 'U')[0].toUpperCase();
    handleRoute();
  } else {
    currentUser = null;
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('app-screen').classList.add('hidden');
  }
});

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (err) {
    errEl.textContent = 'メールアドレスまたはパスワードが正しくありません';
    errEl.classList.remove('hidden');
  }
});

async function handleLogout() {
  await auth.signOut();
}

// ===== ルーター =====
function navigate(path) {
  window.location.hash = '#' + path;
}

function handleRoute() {
  const hash = window.location.hash.slice(1) || '/';
  updateNavActive(hash);
  const parts = hash.split('/').filter(Boolean);

  if (hash === '/' || hash === '') return renderDashboard();
  if (hash === '/clients') return renderClients();
  if (hash === '/cases') return renderCases();
  if (parts[0] === 'clients' && parts[1]) return renderClientDetail(parts[1]);
  if (parts[0] === 'cases' && parts[1]) return renderCaseDetail(parts[1]);
  renderDashboard();
}

window.addEventListener('hashchange', handleRoute);

// ===== ダッシュボード =====
async function renderDashboard() {
  setPageTitle('ダッシュボード');
  setTopbarActions(`<a href="#/cases/new" class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>新規案件</a>`);
  document.getElementById('page-content').innerHTML = `<div class="flex items-center justify-center h-32 text-gray-400"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div></div>`;

  const [casesSnap, clientsSnap] = await Promise.all([
    db.collection('cases').orderBy('createdAt','desc').limit(50).get(),
    db.collection('clients').orderBy('createdAt','desc').limit(100).get(),
  ]);
  const cases = casesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const clients = clientsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  const now = new Date();

  const inProgress = cases.filter(c => c.status !== '承認' && c.status !== '否決').length;
  const thisMonthApproved = cases.filter(c => {
    if (c.status !== '承認') return false;
    const u = c.updatedAt?.toDate ? c.updatedAt.toDate() : new Date(c.updatedAt||0);
    return u.getMonth() === now.getMonth() && u.getFullYear() === now.getFullYear();
  }).length;
  const soonCases = cases.filter(c => {
    if (!c.deadline || c.status === '承認' || c.status === '否決') return false;
    const d = c.deadline.toDate ? c.deadline.toDate() : new Date(c.deadline);
    const diff = (d - now) / (1000*60*60*24);
    return diff >= 0 && diff <= 7;
  });

  const statusCounts = STATUS_LIST.map(s => ({ ...s, count: cases.filter(c => c.status === s.id).length }));

  // 未完了タスクを全案件から収集
  const incompleteTasks = [];
  cases.forEach(c => {
    (c.tasks || []).filter(t => !t.completed).forEach(t => {
      incompleteTasks.push({ ...t, caseId: c.id, caseTitle: c.title, clientName: c.clientName });
    });
  });
  incompleteTasks.sort((a, b) => {
    if (!a.dueDate && !b.dueDate) return 0;
    if (!a.dueDate) return 1;
    if (!b.dueDate) return -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
  });

  document.getElementById('page-content').innerHTML = `
  <div class="space-y-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">ダッシュボード</h1>
      <p class="text-gray-500 text-sm mt-1">${esc(currentUser?.displayName || currentUser?.email)} さん、こんにちは</p>
    </div>
    <!-- サマリーカード -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      ${[
        { label:'総顧客数', value: clients.length, unit:'社', color:'blue' },
        { label:'進行中案件', value: inProgress, unit:'件', color:'indigo' },
        { label:'今月承認', value: thisMonthApproved, unit:'件', color:'green' },
        { label:'期限7日以内', value: soonCases.length, unit:'件', color: soonCases.length > 0 ? 'red' : 'gray' },
      ].map(c => `
        <div class="bg-white rounded-xl border border-gray-200 p-4">
          <p class="text-2xl font-bold text-gray-900">${c.value}<span class="text-sm font-normal text-gray-500 ml-1">${c.unit}</span></p>
          <p class="text-xs text-gray-500 mt-1">${c.label}</p>
        </div>`).join('')}
    </div>
    <!-- ステータス別 -->
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <h2 class="text-base font-semibold text-gray-800 mb-4">ステータス別案件数</h2>
      <div class="grid grid-cols-3 md:grid-cols-7 gap-2">
        ${statusCounts.map(s => `
          <a href="#/cases?status=${encodeURIComponent(s.id)}" class="text-center p-3 rounded-lg bg-gray-50 hover:bg-gray-100 transition-colors cursor-pointer">
            <p class="text-2xl font-bold text-gray-800">${s.count}</p>
            <p class="text-xs text-gray-500 mt-1">${s.id}</p>
          </a>`).join('')}
      </div>
    </div>
    <!-- 未完了タスク -->
    ${incompleteTasks.length > 0 ? `
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold text-gray-800">📋 未完了タスク（${incompleteTasks.length}件）</h2>
      </div>
      <div class="space-y-2">
        ${incompleteTasks.slice(0,10).map(t => {
          const isOverdue = t.dueDate && new Date(t.dueDate) < now;
          const isDueSoon = t.dueDate && !isOverdue && (new Date(t.dueDate) - now) / (1000*60*60*24) <= 3;
          return `<a href="#/cases/${t.caseId}" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-50 cursor-pointer border border-gray-100">
            <div class="w-4 h-4 rounded border-2 border-gray-300 shrink-0 mt-0.5"></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-800 truncate">${esc(t.title)}</p>
              <p class="text-xs text-gray-400 mt-0.5">${esc(t.caseTitle)}${t.assigneeName ? ' · ' + esc(t.assigneeName) : ''}</p>
            </div>
            ${t.dueDate ? `<span class="text-xs shrink-0 px-2 py-0.5 rounded-full font-medium ${isOverdue ? 'bg-red-100 text-red-700' : isDueSoon ? 'bg-orange-100 text-orange-700' : 'bg-gray-100 text-gray-500'}">${isOverdue ? '期限超過' : esc(t.dueDate)}</span>` : ''}
          </a>`;
        }).join('')}
        ${incompleteTasks.length > 10 ? `<p class="text-xs text-gray-400 text-center pt-2">他 ${incompleteTasks.length - 10} 件</p>` : ''}
      </div>
    </div>` : ''}
    <div class="grid md:grid-cols-2 gap-6">
      ${soonCases.length > 0 ? `
      <div class="bg-white rounded-xl border border-red-200 p-5">
        <h2 class="text-base font-semibold text-red-700 mb-4">⚠️ 期限が迫っている案件</h2>
        <div class="space-y-2">
          ${soonCases.map(c => {

function field(label, id, type, value, placeholder) {
  return `<div>

async function saveClient(id) {
  const name = document.getElementById('field-name').value.trim();
  if (!name) { toast('会社名は必須です', 'error'); return; }
  const data = {
    name, industry: v('industry'), representative: v('representative'),
    representativeTitle: v('representativeTitle'), email: v('email'),
    phone: v('phone'), address: v('address'), notes: v('notes'),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  try {
    if (id) {
      await db.collection('clients').doc(id).update(data);
      toast('顧客情報を更新しました');
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('clients').add(data);
      toast('顧客を追加しました');
    }
    closeModal();
    renderClients();
  } catch { toast('保存に失敗しました', 'error'); }
}

async function deleteClient(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  try {
    await db.collection('clients').doc(id).delete();
    toast('削除しました');
    renderClients();
  } catch { toast('削除に失敗しました', 'error'); }
}

function v(id) { return document.getElementById('field-' + id)?.value || ''; }

let caseData = null;
let activeTab = 'overview';

async function renderCaseDetail(id) {
  const isNew = id === 'new';
  setTopbarActions('');
  document.getElementById('page-content').innerHTML = `<div class="flex items-center justify-center h-32"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div></div>`;

  const urlParams = new URLSearchParams(window.location.hash.split('?')[1]||'');
  const preClientId = urlParams.get('clientId') || '';
  const preClientName = urlParams.get('clientName') || '';

  const clientsSnap = await db.collection('clients').orderBy('name').get();
  const clients = clientsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  clientsCache = clients;

  if (isNew) {
    caseData = {
      title: '', clientId: preClientId, clientName: preClientName,
      loanAmount: '', loanPurpose: '', bankName: '',
      status: '初回面談', assigneeName: currentUser?.displayName || currentUser?.email || '',
      caseDate: new Date().toISOString().split('T')[0],
      deadline: '', notes: '', documents: [], tasks: [],
    };
    if (preClientId && preClientName) {
      await autoGenerateTitle(preClientId, preClientName);
    }
  } else {
    const snap = await db.collection('cases').doc(id).get();
    if (!snap.exists) { toast('案件が見つかりません', 'error'); navigate('/cases'); return; }
    const d = snap.data();
    caseData = {
      ...d,
      caseDate: d.caseDate || new Date().toISOString().split('T')[0],
      deadline: d.deadline ? (d.deadline.toDate ? d.deadline.toDate().toISOString().split('T')[0] : d.deadline) : '',
      documents: d.documents || [],
      tasks: d.tasks || [],
    };
  }

  activeTab = 'overview';
  setPageTitle(isNew ? '新規案件作成' : caseData.title);
  renderCaseDetailUI(id, clients, isNew);
}

function renderCaseDetailUI(id, clients, isNew) {
  const isNew_ = id === 'new';
  const submitted = caseData.documents?.filter(d=>d.submitted).length || 0;
  const allDocs = [...DEFAULT_DOCUMENTS, ...(caseData.documents?.filter(d=>d.custom).map(d=>d.name)||[])];
  const completedTasks = caseData.tasks?.filter(t=>t.completed).length || 0;

  document.getElementById('page-content').innerHTML = `
  <div class="space-y-5 max-w-4xl mx-auto">
    <div class="flex items-start justify-between gap-4">
      <div class="flex items-center gap-3">
        <a href="#/cases" class="text-gray-400 hover:text-gray-600">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
          <h1 class="text-2xl font-bold text-gray-900">${isNew_ ? '新規案件作成' : esc(caseData.title)}</h1>
          ${!isNew_ ? `<p class="text-sm text-gray-500">${esc(caseData.clientName)}</p>` : ''}
        </div>
      </div>
      <div class="flex gap-2">
        ${!isNew_ ? `<button onclick="deleteCase('${id}')" class="px-3 py-2 text-sm text-red-600 border border-red-200 rounded-lg hover:bg-red-50">削除</button>` : ''}
        <button onclick="saveCase('${id}')" id="save-btn" class="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">保存</button>
      </div>
    </div>

    ${!isNew_ ? `
    <!-- ステータスバー -->
    <div class="bg-white rounded-xl border border-gray-200 p-4">
      <p class="text-xs font-medium text-gray-500 mb-3">進捗ステータス</p>
      <div class="flex gap-1 flex-wrap">
        ${STATUS_LIST.map((s,i)=>{
          const isActive = caseData.status === s.id;
          const isDone = STATUS_LIST.findIndex(x=>x.id===caseData.status) > i;
          return `<button onclick="setCaseStatus('${s.id}','${id}')" class="px-3 py-1.5 rounded-full text-xs font-medium transition-colors ${isActive ? s.color+' ring-2 ring-offset-1 ring-blue-400' : isDone ? 'bg-gray-100 text-gray-400' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}">${i+1}. ${s.id}</button>`;
        }).join('')}
      </div>
    </div>
    <!-- タブ -->
    <div class="flex border-b border-gray-200">
      ${[
        {id:'overview', label:'基本情報'},
        {id:'documents', label:`書類・ファイル ${submitted}/${allDocs.length}`},
        {id:'tasks', label:`タスク ${completedTasks}/${caseData.tasks?.length||0}`},
      ].map(t=>`
        <button onclick="switchTab('${t.id}','${id}')" class="tab-btn px-4 py-2.5 text-sm font-medium transition-colors ${activeTab===t.id ? 'active' : 'border-transparent text-gray-500 hover:text-gray-700'}">${t.label}</button>
      `).join('')}
    </div>` : ''}

    <!-- タブコンテンツ -->
    <div id="tab-content"></div>
  </div>`;

  renderTabContent(id, clients);
}

function setCaseStatus(status, id) {
  caseData.status = status;
  renderCaseDetailUI(id, clientsCache, false);
}

function switchTab(tab, id) {
  activeTab = tab;
  renderCaseDetailUI(id, clientsCache, false);
}

function renderTabContent(id, clients) {
  const isNew_ = id === 'new';
  const container = document.getElementById('tab-content');
  if (!container) return;

  if (isNew_ || activeTab === 'overview') {

function toggleDoc(docName, id) {
  const docs = caseData.documents || [];
  const existing = docs.find(d=>d.name===docName);
  if (existing) {
    existing.submitted = !existing.submitted;
    existing.submittedAt = existing.submitted ? new Date().toISOString() : null;
  } else {
    docs.push({ name: docName, submitted: true, submittedAt: new Date().toISOString() });
  }
  caseData.documents = docs;
  renderCaseDetailUI(id, clientsCache, false);
  autoSaveField(id, 'documents', caseData.documents);
}

function addCustomDoc(id) {
  const val = document.getElementById('custom-doc-input')?.value.trim();
  if (!val) return;
  caseData.documents = [...(caseData.documents||[]), { name: val, submitted: false, submittedAt: null, custom: true }];
  renderCaseDetailUI(id, clientsCache, false);
  autoSaveField(id, 'documents', caseData.documents);
}

function removeCustomDoc(docName, id) {
  caseData.documents = caseData.documents.filter(d=>d.name!==docName);
  renderCaseDetailUI(id, clientsCache, false);
  autoSaveField(id, 'documents', caseData.documents);
}

function addTask(id) {
  const title = document.getElementById('new-task-title')?.value.trim();
  if (!title) { toast('タスク名を入力してください', 'error'); return; }
  caseData.tasks = [...(caseData.tasks||[]), {
    id: Date.now().toString(), title,
    dueDate: document.getElementById('new-task-due')?.value || '',
    assigneeName: document.getElementById('new-task-assignee')?.value || '',
    completed: false, createdAt: new Date().toISOString(),
  }];
  renderCaseDetailUI(id, clientsCache, false);
  autoSaveField(id, 'tasks', caseData.tasks);
}

function toggleTask(taskId, id) {
  caseData.tasks = caseData.tasks.map(t => t.id===taskId ? {...t, completed: !t.completed} : t);
  renderCaseDetailUI(id, clientsCache, false);
  autoSaveField(id, 'tasks', caseData.tasks);
}

function removeTask(taskId, id) {
  caseData.tasks = caseData.tasks.filter(t=>t.id!==taskId);
  renderCaseDetailUI(id, clientsCache, false);
  autoSaveField(id, 'tasks', caseData.tasks);
}

async function handleClientChange(clientId, id) {
  const client = clientsCache.find(c=>c.id===clientId);
  caseData.clientId = clientId;
  caseData.clientName = client?.name || '';
  if (id === 'new' && clientId && client?.name) {
    await autoGenerateTitle(clientId, client.name);
    document.getElementById('cd-title').value = caseData.title;
  }
}

async function autoGenerateTitle(clientId, clientName) {
  const snap = await db.collection('cases').where('clientId','==',clientId).get();
  const nextNum = snap.size + 1;
  caseData.title = `${clientName}_${String(nextNum).padStart(3,'0')}`;
}

function syncCaseFormData() {
  if (document.getElementById('cd-clientId')) {
    caseData.clientId = document.getElementById('cd-clientId')?.value || caseData.clientId;
    caseData.status = document.getElementById('cd-status')?.value || caseData.status;
    caseData.loanAmount = document.getElementById('cd-loanAmount')?.value || '';
    caseData.bankName = document.getElementById('cd-bankName')?.value || '';
    caseData.loanPurpose = document.getElementById('cd-loanPurpose')?.value || '';
    caseData.assigneeName = document.getElementById('cd-assigneeName')?.value || '';
    caseData.caseDate = document.getElementById('cd-caseDate')?.value || '';
    caseData.deadline = document.getElementById('cd-deadline')?.value || '';
    caseData.notes = document.getElementById('cd-notes')?.value || '';
  }
}

// タスク・書類の自動保存（フィールド単位）
async function autoSaveField(id, field, value) {
  if (!id || id === 'new') return;
  try {
    await db.collection('cases').doc(id).update({
      [field]: value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    showAutoSaveIndicator();
  } catch (e) { /* サイレント失敗 */ }
}

function showAutoSaveIndicator() {
  let el = document.getElementById('autosave-indicator');
  if (!el) {
    el = document.createElement('div');
    el.id = 'autosave-indicator';
    el.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:12px;padding:6px 14px;border-radius:99px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:9999;';
    document.body.appendChild(el);
  }
  el.textContent = '✓ 自動保存しました';
  el.style.opacity = '1';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.opacity = '0'; }, 1500);
}

async function saveCase(id) {
  syncCaseFormData();
  if (!caseData.title.trim()) { toast('案件名は必須です', 'error'); return; }
  if (!caseData.clientId) { toast('顧客を選択してください', 'error'); return; }
  const btn = document.getElementById('save-btn');
  if (btn) btn.textContent = '保存中...';

  const payload = {
    ...caseData,
    deadline: caseData.deadline ? new Date(caseData.deadline) : null,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };
  try {
    if (id === 'new') {
      payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('cases').add(payload);
      toast('案件を作成しました');
      navigate('/cases/' + ref.id);
    } else {
      await db.collection('cases').doc(id).update(payload);
      toast('保存しました');
      if (btn) btn.textContent = '保存';
    }
  } catch (e) {
    toast('保存に失敗しました: ' + e.message, 'error');
    if (btn) btn.textContent = '保存';
  }
}

async function deleteCase(id) {
  if (!confirm('この案件を削除しますか？')) return;
  try {
    await db.collection('cases').doc(id).delete();
    toast('削除しました');
    navigate('/cases');
  } catch { toast('削除に失敗しました', 'error'); }
}

// ===== ファイルアップロード（Firebase Storage）=====
async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1280;
      let { width, height } = img;
      if (width > MAX || height > MAX) {
        if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
        else { width = Math.round(width * MAX / height); height = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(resolve, 'image/jpeg', 0.7);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

function fileIcon(mimeType) {
  return MIME_ICONS[mimeType] || '📎';
}

function fmtBytes(bytes) {
  if (!bytes) return '';
  const n = Number(bytes);
  if (n < 1024) return `${n} B`;
  if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`;
  return `${(n/1024/1024).toFixed(1)} MB`;
}

  container.innerHTML = `
  <div class="space-y-4" id="fu-root">

  const dropzone = document.getElementById('fu-dropzone');
  const input = document.getElementById('fu-input');

  dropzone.addEventListener('click', () => input.click());

async function loadFileList(clientName, caseName) {
  const listEl = document.getElementById('fu-list');
  if (!listEl) return;
  try {
    const ref = storage.ref(`${clientName}/${caseName}`);
    const result = await ref.listAll();
    if (result.items.length === 0) {
      listEl.innerHTML = `<p class="text-center py-6 text-gray-400 text-sm">まだファイルがありません</p>`;
      return;
    }
    const files = await Promise.all(result.items.map(async item => {
      const meta = await item.getMetadata();
      const url = await item.getDownloadURL();
      return { name: item.name, fullPath: item.fullPath, url, size: meta.size, contentType: meta.contentType, timeCreated: meta.timeCreated };
    }));
    files.sort((a,b) => new Date(b.timeCreated) - new Date(a.timeCreated));
    listEl.innerHTML = `
    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      ${files.map(f=>`
      <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 border-b border-gray-100 last:border-0">
        <span class="text-xl flex-shrink-0">${fileIcon(f.contentType)}</span>
        <div class="min-w-0 flex-1">
          <a href="${f.url}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-blue-700 hover:underline truncate block">${esc(f.name)}</a>
          <p class="text-xs text-gray-400 mt-0.5">${fmtBytes(f.size)}${f.size&&f.timeCreated?' · ':''}${f.timeCreated?new Date(f.timeCreated).toLocaleDateString('ja-JP'):''}</p>
        </div>
        <a href="${f.url}&response-content-disposition=attachment" target="_blank" class="text-gray-300 hover:text-blue-500 p-1" title="ダウンロード">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        </a>
        <button data-action="delete-file" data-path="${esc(f.fullPath)}" class="text-gray-300 hover:text-red-500 p-1" title="削除">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>`).join('')}
    </div>`;
  } catch (e) {
    listEl.innerHTML = `<p class="text-center py-6 text-red-400 text-sm">ファイル一覧の取得に失敗しました</p>`;
  }
}

async function handleFiles(fileList, clientName, caseName) {
  const files = Array.from(fileList);
  if (!files.length) return;
  const dropzone = document.getElementById('fu-dropzone');
  if (dropzone) dropzone.innerHTML = `<div class="flex flex-col items-center gap-2"><div class="w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div><p class="text-sm text-blue-600 font-medium">アップロード中...</p></div>`;

  let success = 0;
  for (const file of files) {
    try {
      let uploadFile = file;
      if (file.type === 'image/jpeg' || file.type === 'image/png') {
        const blob = await compressImage(file);
        uploadFile = new File([blob], file.name, { type: 'image/jpeg' });
      }
      const path = `${clientName}/${caseName}/${file.name}`;
      await storage.ref(path).put(uploadFile);
      success++;
    } catch (e) {
      toast(`「${file.name}」のアップロードに失敗しました`, 'error');
    }
  }
  if (success > 0) toast(`${success}件のファイルをアップロードしました`);

  if (dropzone) {
    dropzone.innerHTML = `
    <input type="file" id="fu-input" multiple class="hidden">
    <svg class="w-10 h-10 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
    <p class="text-sm font-medium text-gray-600">クリックまたはドラッグ＆ドロップでアップロード</p>
    <p class="text-xs text-gray-400 mt-1">PDF・Word・Excel・画像など</p>`;
    const newInput = document.getElementById('fu-input');
    dropzone.addEventListener('click', () => newInput.click());
    newInput.addEventListener('change', e => handleFiles(e.target.files, clientName, caseName));
  }
  await loadFileList(clientName, caseName);
}

async function deleteStorageFile(fullPath, clientName, caseName) {
  const name = fullPath.split('/').pop();
  if (!confirm(`「${name}」を削除しますか？`)) return;
  try {
    await storage.ref(fullPath).delete();
    toast('ファイルを削除しました');
    await loadFileList(clientName, caseName);
  } catch { toast('削除に失敗しました', 'error'); }
}

// ===== 初期化 =====
window.addEventListener('hashchange', handleRoute);

// イベント委譲（data-action に基づくクリック処理）
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;
  if (action === 'delete-client') {
    const id = el.dataset.id;
    const name = clientsCache.find(c => c.id === id)?.name || '';
    deleteClient(id, name);
  } else if (action === 'toggle-doc') {
    toggleDoc(el.dataset.doc, el.dataset.caseId);
  } else if (action === 'remove-doc') {
    removeCustomDoc(el.dataset.doc, el.dataset.caseId);
  } else if (action === 'delete-file') {
    if (fileUploadCtx) deleteStorageFile(el.dataset.path, fileUploadCtx.clientName, fileUploadCtx.caseName);
  }
});
</script>
