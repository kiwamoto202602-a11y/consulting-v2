<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>融資支援管理システム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@400;600;800&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen" style="min-height:100vh;background:#07101F;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;">
  <!-- Ambient glows -->
  <div style="position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:700px;height:360px;background:radial-gradient(ellipse,rgba(197,154,45,0.10) 0%,transparent 65%);pointer-events:none;"></div>
  <div style="position:absolute;bottom:-15%;right:-5%;width:500px;height:400px;background:radial-gradient(ellipse,rgba(27,58,92,0.25) 0%,transparent 65%);pointer-events:none;"></div>

  <div style="width:100%;max-width:388px;position:relative;z-index:1;">
    <!-- Brand -->
    <div class="fu fu-1" style="text-align:center;margin-bottom:36px;">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border:1px solid rgba(197,154,45,0.35);border-radius:12px;background:rgba(197,154,45,0.08);margin-bottom:22px;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#C59A2D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 style="font-family:'Shippori Mincho B1',serif;font-size:21px;color:#EDE8E0;letter-spacing:0.06em;margin-bottom:7px;">融資支援管理システム</h1>
      <p style="font-size:11px;color:#3A5268;letter-spacing:0.12em;text-transform:uppercase;">Banking Consulting Platform</p>
    </div>

    <!-- Card -->
    <div class="fu fu-2" style="background:#FFFFFF;border-radius:12px;padding:36px;box-shadow:0 8px 48px rgba(0,0,0,0.38),0 1px 0 rgba(255,255,255,0.04);">
      <p style="font-size:13px;font-weight:600;color:var(--t1);margin-bottom:24px;letter-spacing:0.04em;">ログイン</p>
      <form id="login-form" style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:7px;letter-spacing:0.05em;text-transform:uppercase;">メールアドレス</label>
          <input id="login-email" type="email" required placeholder="example@company.com"
            style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;">
        </div>
        <div>
          <label style="display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:7px;letter-spacing:0.05em;text-transform:uppercase;">パスワード</label>
          <input id="login-password" type="password" required placeholder="••••••••" minlength="6"
            style="width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;">
        </div>
        <div id="login-error" class="hidden" style="font-size:12.5px;color:#991B1B;padding:8px 12px;background:#FEE8E6;border-radius:6px;"></div>
        <button type="submit" class="btn-primary" style="width:100%;justify-content:center;padding:11px;margin-top:4px;font-size:14px;letter-spacing:0.04em;">
          ログイン
        </button>
      </form>
    </div>

    <div class="fu fu-3" style="text-align:center;margin-top:18px;">
      <p style="font-size:11px;color:#2A3D54;letter-spacing:0.03em;">アカウントの追加はシステム管理者にお問い合わせください</p>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app-screen" class="flex h-screen overflow-hidden" style="display:none">

  <!-- Mobile overlay -->
  <div id="sidebar-overlay" class="hidden fixed inset-0 z-40" style="background:rgba(0,0,0,0.6);" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="flex flex-col h-screen shrink-0" style="width:232px;">
    <!-- Brand -->
    <div style="padding:20px 18px 16px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:30px;height:30px;border-radius:7px;border:1px solid rgba(197,154,45,0.4);background:rgba(197,154,45,0.10);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C59A2D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div>
          <p style="font-family:'Shippori Mincho B1',serif;font-size:12.5px;color:#E8E0D4;letter-spacing:0.04em;line-height:1.2;">融資支援管理</p>
          <p style="font-size:9.5px;color:#3A5268;letter-spacing:0.06em;margin-top:2px;text-transform:uppercase;">Consulting System</p>
        </div>
      </div>
    </div>
    <div style="height:1px;background:rgba(255,255,255,0.07);margin:0 16px 12px;"></div>

    <!-- Nav -->
    <nav style="flex:1;padding:0 10px;display:flex;flex-direction:column;gap:2px;">
      <a href="#/" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer" data-path="/">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span style="font-size:13px;">ダッシュボード</span>
      </a>
      <a href="#/clients" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer" data-path="/clients">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        <span style="font-size:13px;">顧客管理</span>
      </a>
      <a href="#/cases" class="nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm cursor-pointer" data-path="/cases">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span style="font-size:13px;">案件管理</span>
      </a>
    </nav>

    <!-- User -->
    <div style="margin:12px 10px;padding:12px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.07);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px;">
        <div id="sidebar-avatar" style="width:26px;height:26px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#FFF;flex-shrink:0;">K</div>
        <span id="sidebar-user" style="font-size:11.5px;color:#7A9AB6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      </div>
      <button onclick="handleLogout()" style="width:100%;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;background:transparent;border:none;cursor:pointer;color:#4A6A82;font-size:12px;font-family:'Noto Sans JP',sans-serif;transition:all 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.07)';this.style.color='#FFF'" onmouseout="this.style.background='transparent';this.style.color='#4A6A82'">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        ログアウト
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div id="main" class="flex-1 flex flex-col overflow-hidden" style="margin-left:232px;">
    <!-- Topbar -->
    <header style="background:var(--card);border-bottom:1px solid var(--border-2);height:54px;display:flex;align-items:center;padding:0 20px;flex-shrink:0;box-shadow:0 1px 0 var(--border-2);">
      <button id="menu-btn" onclick="openSidebar()" style="margin-right:12px;padding:6px;border-radius:6px;background:transparent;border:none;cursor:pointer;color:var(--t2);">
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h2 id="page-title" style="flex:1;font-size:14px;font-weight:600;color:var(--t1);letter-spacing:0.02em;"></h2>
      <div id="topbar-actions" style="display:flex;align-items:center;gap:8px;"></div>
    </header>
    <!-- Content -->
    <div id="page-content" style="flex:1;overflow:auto;padding:24px;"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

<!-- Modal -->
<div id="modal-overlay" class="hidden fixed inset-0 z-40 flex items-center justify-center p-4" style="background:rgba(8,14,27,0.55);backdrop-filter:blur(2px);">
  <div id="modal-box" style="background:var(--card);border-radius:12px;box-shadow:var(--shadow-m);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid var(--border-2);"></div>
</div>

<!-- ===== JavaScript ===== -->

<script src="app.js"></script>
</body>
</html>
